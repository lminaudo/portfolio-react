apiVersion: batch/v1
kind: Job
metadata:
  name: cloudflare-purge-cache
  namespace: loganminaudo-website
  annotations:
    # This tells ArgoCD to run the job AFTER the sync is successful
    argocd.argoproj.io/hook: PostSync
    # This deletes the job pod automatically after it finishes
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.6.0 # Lightweight curl image
          command:
            - /bin/sh
            - -c
            - |
              curl -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          env:
            - name: CF_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-credentials
                  key: zone-id
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-credentials
                  key: api-token
      restartPolicy: Never
  backoffLimit: 2
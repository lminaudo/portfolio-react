name: Build and Push
on:
  push:
    branches: [ "K8" ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          # 1. Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 2. Update the image tag in your deployment file
          # Replace 'deployment.yaml' with the actual path to your file
          # Replace 'loganminaudo-website' with your container name
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:${{ github.sha }}|g" k8/deployment.yaml
          
          # 3. Commit and push back to the K8 branch
          git add k8/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push origin K8
name: Build and Push
on:
  push:
    branches: [ "K8", "DevK8" ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag prefix
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "K8" ]; then
            echo "env_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "env_tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:${{ steps.vars.outputs.env_tag }}-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:${{ steps.vars.outputs.env_tag }}-${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          # 1. Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 2. Update the image tag in your deployment file
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/loganminaudo-website:${{ steps.vars.outputs.env_tag }}-${{ github.sha }}|g" k8/deployment.yaml
          
          # 3. Commit and push back to the branch
          git add k8/deployment.yaml
          git commit -m "chore: update image tag to ${{ steps.vars.outputs.env_tag }}-${{ github.sha }}"
          git push origin ${{ github.ref_name }}
